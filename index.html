<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reticulum Web Client</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230f1115'/%3E%3Ctext y='75' x='50' font-size='70' text-anchor='middle' fill='%235eb0ff'%3E%E2%8B%85%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>Reticulum Web Client
    <small>LoRa messaging via RNode over Bluetooth</small>
  </h1>
  <span class="version">v0.1.0</span>
</header>

<div id="unsupported" class="notice err hidden">
  <strong>Web Bluetooth not supported.</strong>
  Use Chrome, Edge, or Brave on Android or desktop.
</div>

<!-- Connect panel -->
<div class="panel">
  <h2>Connect</h2>
  <div class="row">
    <span><span class="status-dot" id="conn-dot"></span><span id="conn-text">Disconnected</span></span>
    <button id="btn-connect-ble">Connect (BLE)</button>
    <button id="btn-connect-serial" class="secondary">Connect (Serial)</button>
    <button id="btn-connect-ws" class="secondary">Connect (WebSocket)</button>
    <button id="btn-disconnect" class="secondary hidden">Disconnect</button>
    <span id="radio-status" class="status-off"></span>
  </div>
  <div class="row" id="ws-url-row" style="margin-top: 8px;">
    <div class="field wide">
      <label>WebSocket URL (for TCP-via-bridge)</label>
      <input id="ws-url" type="text" value="ws://localhost:7878" placeholder="ws://localhost:7878">
    </div>
  </div>
</div>

<!-- Identity panel -->
<div id="identity-panel" class="panel">
  <h2>Your Identity</h2>
  <div class="row">
    <div class="field wide">
      <label>LXMF Address</label>
      <div class="identity-hash" id="my-address">—</div>
    </div>
    <div class="field">
      <label>Display Name</label>
      <input id="my-name" type="text" value="WebClient" maxlength="31">
    </div>
  </div>
  <div class="actions">
    <button id="btn-announce">Send Announce</button>
    <button id="btn-export-id" class="secondary">Export Identity</button>
    <button id="btn-new-id" class="secondary">New Identity</button>
  </div>
</div>

<!-- Radio config (collapsible) -->
<details id="config-panel" class="panel hidden">
  <summary style="cursor: pointer; color: var(--muted); font-size: 12px;">Radio Configuration</summary>
  <div class="row" style="margin-top: 12px;">
    <div class="field"><label>Frequency (Hz)</label>
      <input id="cfg-freq" type="number" value="904375000"></div>
    <div class="field narrow"><label>Bandwidth</label>
      <select id="cfg-bw">
        <option value="7800">7.8 kHz</option>
        <option value="10400">10.4 kHz</option>
        <option value="15600">15.6 kHz</option>
        <option value="20800">20.8 kHz</option>
        <option value="31250">31.25 kHz</option>
        <option value="41700">41.7 kHz</option>
        <option value="62500">62.5 kHz</option>
        <option value="125000">125 kHz</option>
        <option value="250000" selected>250 kHz</option>
        <option value="500000">500 kHz</option>
      </select></div>
    <div class="field narrow"><label>SF</label>
      <select id="cfg-sf">
        <option>7</option><option>8</option><option>9</option>
        <option selected>10</option><option>11</option><option>12</option>
      </select></div>
    <div class="field narrow"><label>CR</label>
      <select id="cfg-cr">
        <option value="5" selected>4/5</option><option value="6">4/6</option>
        <option value="7">4/7</option><option value="8">4/8</option>
      </select></div>
    <div class="field narrow"><label>TX Power</label>
      <input id="cfg-txp" type="number" min="-9" max="22" value="22"></div>
  </div>
  <div class="actions">
    <button id="btn-start-radio">Start Radio</button>
    <button id="btn-stop-radio" class="secondary">Stop</button>
  </div>
</details>

<!-- Contacts + Messages -->
<div id="messaging-panel" class="panel hidden" style="padding: 0;">
  <div style="display: flex; min-height: 450px;">
    <!-- Contact sidebar -->
    <div style="width: 260px; border-right: 1px solid var(--border); overflow-y: auto;">
      <div style="padding: 14px 16px; border-bottom: 1px solid var(--border);">
        <h2 style="margin-bottom: 0;">Contacts</h2>
      </div>
      <ul class="contact-list" id="contact-list">
        <li style="color: var(--muted); font-size: 13px; cursor: default;">Listening for announces...</li>
      </ul>
    </div>
    <!-- Conversation area -->
    <div style="flex: 1; display: flex; flex-direction: column;">
      <div style="padding: 14px 16px; border-bottom: 1px solid var(--border);">
        <h2 id="conv-title" style="margin-bottom: 0;">Select a contact</h2>
      </div>
      <div class="message-list" id="message-list" style="flex: 1; padding: 14px 16px;"></div>
      <div id="compose-area" class="hidden" style="padding: 12px 16px; border-top: 1px solid var(--border);">
        <div class="row">
          <div class="field wide">
            <textarea id="msg-content" placeholder="Type a message..." rows="2"></textarea>
          </div>
          <button id="btn-send">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Log panel -->
<details class="panel">
  <summary style="cursor: pointer; color: var(--muted); font-size: 12px;">Log</summary>
  <div style="margin-top: 10px;">
    <button id="btn-clear-log" class="secondary" style="margin-bottom: 8px;">Clear</button>
    <div id="log"></div>
  </div>
</details>

<!-- Import map: resolve bare specifiers to esm.sh CDN -->
<script type="importmap">
{
  "imports": {
    "@noble/curves/ed25519": "https://esm.sh/@noble/curves@1.8.1/ed25519",
    "@msgpack/msgpack": "https://esm.sh/@msgpack/msgpack@3.0.0-beta2"
  }
}
</script>
<script type="module" src="js/app.js"></script>
</body>
</html>
