name: build-apk

# Builds a signed Android APK every time an `android-v*` tag is
# pushed, and attaches it to a GitHub release named after the tag.
# Runs only on tags, never on every push to master — the Pages
# deploy keeps up with master on its own and the APK build is
# intentionally manual so you decide when to cut a release.
#
# Prerequisites:
#   1. The bootstrap-android workflow has been run at least once,
#      so android/ exists in the repo.
#   2. These four repository secrets are set
#      (Settings → Secrets and variables → Actions):
#        ANDROID_KEYSTORE_BASE64   — base64 of your release.keystore
#        ANDROID_KEYSTORE_PASSWORD — keystore password
#        ANDROID_KEY_ALIAS         — key alias inside the keystore
#        ANDROID_KEY_PASSWORD      — key password
#
# Tag format: `android-v0.3.1`. The workflow extracts `0.3.1` into
# Android's versionName and derives a monotonically increasing
# versionCode as major*10000 + minor*100 + patch (so 0.3.1 → 30100,
# 1.0.0 → 1000000). That means version tags must never go backward.

on:
  push:
    tags: ['android-v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to build (android-v0.3.1)'
        required: true
        default: 'android-v0.3.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Abort if android/ is missing
        run: |
          if [ ! -d android ]; then
            echo "android/ directory not found."
            echo "Run the bootstrap-android workflow first."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          VERSION="${TAG#android-v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}
          CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "tag=$TAG"              >> $GITHUB_OUTPUT
          echo "version=$VERSION"      >> $GITHUB_OUTPUT
          echo "version_code=$CODE"    >> $GITHUB_OUTPUT
          echo "Building $TAG → versionName=$VERSION versionCode=$CODE"

      - name: Install JS deps
        run: npm ci

      - name: Stage web assets
        run: bash tools/stage_site.sh

      - name: Stamp version + commit SHA into www/index.html
        # Rewrites the hardcoded v0.x.y baseline in the version
        # badges to the tag-derived version and replaces every
        # <!-- BUILD_SHA --> marker with a clickable SHA link,
        # mirroring what deploy.yml does for the Pages build. Runs
        # after stage (so it edits the copy in www/, not the
        # committed index.html) and before `cap sync` (so Capacitor
        # copies the stamped file into the Android assets dir).
        env:
          SHA_FULL: ${{ github.sha }}
          REPO:     ${{ github.repository }}
          VERSION:  ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          import os, re
          from pathlib import Path

          sha_full  = os.environ['SHA_FULL']
          repo      = os.environ['REPO']
          version   = os.environ['VERSION']
          sha_short = sha_full[:7]
          sha_url   = f"https://github.com/{repo}/commit/{sha_full}"

          path = Path("www/index.html")
          html = path.read_text(encoding='utf-8')

          # Bump every v#.#.# immediately preceding a BUILD_SHA
          # marker to the tag-derived version. Both the sidebar
          # logo badge and the About card version use the same
          # "v0.3.0<!-- BUILD_SHA -->" pattern, so one regex
          # handles both.
          html, n_ver = re.subn(
              r'v\d+\.\d+\.\d+(?=<!-- BUILD_SHA -->)',
              f'v{version}',
              html,
          )
          print(f"Rewrote {n_ver} version badge(s) to v{version}")

          # Stamp every BUILD_SHA marker with a link to the commit.
          replacement = f' <a class="version-sha" href="{sha_url}" target="_blank" rel="noopener" title="Commit this build was deployed from">{sha_short}</a>'
          html = html.replace('<!-- BUILD_SHA -->', replacement)

          path.write_text(html, encoding='utf-8')
          print(f"Stamped v{version} · {sha_short} -> {sha_url}")
          PY

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Write versionName / versionCode into build.gradle
        env:
          VERSION_NAME: ${{ steps.version.outputs.version }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: |
          python - <<'PY'
          import os, re
          from pathlib import Path
          path = Path("android/app/build.gradle")
          s = path.read_text()
          s = re.sub(r'versionCode\s+\d+', f"versionCode {os.environ['VERSION_CODE']}", s, count=1)
          s = re.sub(r'versionName\s+"[^"]*"', f'versionName "{os.environ["VERSION_NAME"]}"', s, count=1)
          path.write_text(s)
          print(f"Set versionCode={os.environ['VERSION_CODE']} versionName={os.environ['VERSION_NAME']}")
          PY

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is not set."
            echo "See build-apk.yml header for setup instructions."
            exit 1
          fi
          python - <<'PY'
          import base64, os, re, sys
          raw = os.environ['KEYSTORE_BASE64']
          print(f"Raw secret length: {len(raw)} bytes")
          # Drop every character that is NOT in the base64 alphabet.
          # Catches whitespace, CR/LF, zero-width spaces, and any
          # stray junk from copy-paste through a browser terminal.
          clean = re.sub(r'[^A-Za-z0-9+/=]', '', raw)
          print(f"Cleaned base64 length: {len(clean)} bytes")
          # Re-pad to a multiple of 4. Some terminals or the GitHub
          # secrets UI occasionally swallow trailing '=' characters,
          # which breaks strict base64 decoders but is harmless to
          # re-add because the original padding is deterministic.
          if len(clean) % 4:
              pad = 4 - (len(clean) % 4)
              clean = clean + ('=' * pad)
              print(f"Padded to multiple of 4 with {pad} '=' — new length {len(clean)}")
          try:
              data = base64.b64decode(clean, validate=False)
          except Exception as e:
              print(f"FATAL: base64 decode failed: {e}", file=sys.stderr)
              sys.exit(1)
          print(f"Decoded bytes: {len(data)}")
          if len(data) < 1000:
              print("FATAL: decoded keystore is suspiciously small (<1KB).")
              print("The ANDROID_KEYSTORE_BASE64 secret is likely truncated.")
              print("Re-run 'base64 -w 0 release.keystore' in the Codespace")
              print("and re-paste the full single-line output into the secret.")
              sys.exit(1)
          # JKS magic is FE ED FE ED, PKCS12 magic is 30 82.
          head = data[:4].hex()
          print(f"Decoded file starts with: {head}")
          if not (head.startswith('feedfeed') or head.startswith('3082')):
              print("WARNING: decoded file does not look like a Java keystore")
              print("(neither JKS nor PKCS12 magic bytes at offset 0). Build")
              print("may still work if Android tooling recognises the format.")
          with open('android/app/release.keystore', 'wb') as f:
              f.write(data)
          PY
          ls -la android/app/release.keystore

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH:     ${{ github.workspace }}/android/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK with version
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             reticulum-webclient-${{ steps.version.outputs.version }}.apk
          ls -la reticulum-webclient-*.apk
          sha256sum reticulum-webclient-*.apk

      - name: Create GitHub release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Android ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: reticulum-webclient-*.apk
          body: |
            Android APK build of Reticulum Web Client ${{ steps.version.outputs.version }}.

            **Install**: download the APK below, tap it on your phone, accept
            the one-time "install from unknown sources" prompt. The app
            registers as "Reticulum" on your launcher and requests Bluetooth
            permission on first connect.

            Same underlying code as the web app at
            https://thatsfguy.github.io/reticulum-lora-webclient/ — if an
            issue reproduces in the web version too, file it there.
